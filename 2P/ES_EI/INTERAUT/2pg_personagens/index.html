<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../1pg_principal/Imagens/favicon.ico" type="image/x-icon">
    <script src="script.js" defer></script>
    <title>Seleção de Personagens</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

<body>
    <div class="container">
        <video autoplay loop muted class="video">
            <source src="Imagens/lv_0_20250129200226.mp4">
        </video>
        <h1 class="name" id="t1">HABILIDADES</h1>
        <div class="characters">
            <!-- personagem -->
            <div class="character-card" data-id="1">
                <img src="Imagens/ge14fev22-mediacaocriancas-dudaoliva-c1-texto.jpg" alt="personagem01">
                <div class="text">
                    <h2><u>INTERAÇÃO</u></h2>
                    <p class="description"><br> Aprimore suas habilidades de interação e comunicação com este modo de fases voltado a essa habilidade.</p>
                </div>
            </div> 
        </div>
        
        <div id="confirmation" class="hidden">
            <button id="confirm-button">Confirmar</button>
        </div>

        <div id="confirmation-message" class="hidden">
            <strong><span id="selected-character-name"></span></strong>
            <strong><p>Preparado?! Vamos começar...</p></strong>
        </div>
    </div>
